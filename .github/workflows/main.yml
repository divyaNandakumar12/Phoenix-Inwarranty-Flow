name: Postman collection workflow

on:
  push:
    branches: [main]

  workflow_dispatch:

  schedule:
    - cron: '30 2 * * *'   # 8 AM IST
    - cron: '0 14 * * *'   # 7 PM IST

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Install node and npm
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install newman and html-extra globally
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run the postman collections with newman
        run: |
          newman run "InWarranty-Flow Collection Copy.postman_collection.json" \
          -e QA.postman_environment.json \
          -d testData.csv \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./newman/index.html

      - name: Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Newman report
          path: newman/*.html

      - name: Creating github page actions
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Phoenix Inwarranty Flow Report
          to: divyananda0410@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
                Hi,
                Phoenix Inwarranty flow tests are executed.The report has been published and URL is
                https://divyanandakumar12.github.io/Phoenix-Inwarranty-Flow/
          
          
          
        
        
